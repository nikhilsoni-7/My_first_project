<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-top: 20px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 40px;
            cursor: pointer;
        }

        #status {
            margin-top: 20px;
            font-size: 24px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div class="board">
    <button class="cell" onclick="play(0)"></button>
    <button class="cell" onclick="play(1)"></button>
    <button class="cell" onclick="play(2)"></button>
    <button class="cell" onclick="play(3)"></button>
    <button class="cell" onclick="play(4)"></button>
    <button class="cell" onclick="play(5)"></button>
    <button class="cell" onclick="play(6)"></button>
    <button class="cell" onclick="play(7)"></button>
    <button class="cell" onclick="play(8)"></button>
</div>

<p id="status">Player X's Turn</p>

<button onclick="resetGame()">Restart Game</button>

<script>
let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameOver = false;

function play(index) {
    if (board[index] !== "" || gameOver) return;

    board[index] = currentPlayer;
    document.getElementsByClassName("cell")[index].innerText = currentPlayer;

    checkWinner();

    currentPlayer = currentPlayer === "X" ? "O" : "X";

    if (!gameOver) {
        document.getElementById("status").innerText =
            "Player " + currentPlayer + "'s Turn";
    }
}

function checkWinner() {
    const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    for (let combo of wins) {
        let a = combo[0];
        let b = combo[1];
        let c = combo[2];

        if (
            board[a] &&
            board[a] === board[b] &&
            board[a] === board[c]
        ) {
            document.getElementById("status").innerText =
                "Player " + board[a] + " Wins!";
            gameOver = true;
            return;
        }
    }

    if (!board.includes("")) {
        document.getElementById("status").innerText = "It's a Draw!";
        gameOver = true;
    }
}

function resetGame() {
    board = ["","","","","","","","",""];
    currentPlayer = "X";
    gameOver = false;

    let cells = document.getElementsByClassName("cell");

    for (let i = 0; i < cells.length; i++) {
        cells[i].innerText = "";
    }

    document.getElementById("status").innerText =
        "Player X's Turn";
}
</script>

</body>
</html>
