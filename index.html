<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikhil | God Mode Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #050814;
    color: white;
    overflow-x: hidden;
}

/* ⭐ STAR BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

nav ul {
    display: flex;
    gap: 20px;
    list-style: none;
}

nav a {
    color: white;
    text-decoration: none;
}

nav a:hover {
    color: #00ffd5;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.profile {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #00ffd5;
    box-shadow: 0 0 40px rgba(0,255,213,0.4);
}

.profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hero h1 {
    font-size: 50px;
    margin-top: 10px;
}

/* BUTTONS */
.btn {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #00ffd5;
    color: black;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* SECTIONS */
section {
    padding: 90px 20px;
    max-width: 1000px;
    margin: auto;
}

/* 3D CARDS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
    transform-style: preserve-3d;
}

.card:hover {
    transform: perspective(1000px) rotateY(10deg) rotateX(10deg);
    box-shadow: 0 10px 30px rgba(0,255,213,0.3);
}

/* SKILLS */
.skills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.skills span {
    padding: 8px 15px;
    background: #00ffd5;
    color: black;
    border-radius: 20px;
}

/* FLOAT BUTTON */
.float-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #00ffd5;
    color: black;
    padding: 15px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    opacity: 0.6;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<nav>
    <h3>Nikhil.dev</h3>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
    </ul>
</nav>

<!-- HERO -->
<div class="hero" id="home">

    <div class="profile">
        <img src="profile.jpg" alt="My Photo">
    </div>

    <h1>Hello, I'm Nikhil</h1>

    <button class="btn" onclick="downloadResume()">Download Resume</button>
</div>

<!-- ABOUT -->
<section id="about">
    <h2>About Me</h2>
    <div class="card">
        I am a learner building modern web experiences with animations and clean UI.
    </div>
</section>

<!-- SKILLS -->
<section id="skills">
    <h2>Skills</h2>
    <div class="card skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>Java</span>
        <span>JSP</span>
    </div>
</section>

<!-- PROJECTS -->
<section id="projects">
    <h2>Projects</h2>

    <div class="grid">

        <div class="card" onclick="openModal('Portfolio Website')">
            Portfolio Website
        </div>

        <div class="card" onclick="openModal('Calculator App')">
            Calculator App
        </div>

        <div class="card">
            Coming Soon 🚀
        </div>

    </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalText"></h3>
        <button class="btn" onclick="closeModal()">Close</button>
    </div>
</div>

<!-- FLOAT BUTTON -->
<div class="float-btn" onclick="alert('Contact coming soon!')">
    Hire Me
</div>

<footer>
    © 2026 Nikhil | God Mode Portfolio ✨
</footer>

<script>

/* STAR BACKGROUND */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    }

    requestAnimationFrame(drawStars);
}
drawStars();

/* MODAL */
function openModal(text) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalText").innerText = text;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

/* RESUME */
function downloadResume() {
    alert("Add your resume file link here!");
}
</script>

</body>
    </html>
